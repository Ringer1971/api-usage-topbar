<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Usage Topbar</title>
  <style>
    body { margin:0; font-family: Segoe UI, Arial, sans-serif; background: rgba(0,0,0,0); }
    .bar {
      height: 44px;
      padding: 8px 12px;
      box-sizing: border-box;
      background: rgba(20,20,20,0.75);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .metric { display:flex; align-items: baseline; gap: 8px; }
    .label { opacity: 0.8; font-size: 12px; }
    .value { font-weight: 600; font-size: 14px; }
    .tiny { opacity:0.7; font-size: 12px; }
    .spacer { flex: 1; }
    .dot { width:8px; height:8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 0 2px rgba(74,222,128,0.15); }
  </style>
</head>
<body>
  <div class="bar">
    <div class="dot" title="running"></div>
    <div class="metric"><div class="label">Session</div><div class="value" id="sessionUsd">$0.00</div><div class="tiny" id="sessionTok">(0 in / 0 out)</div></div>
    <div class="metric"><div class="label">Weekly</div><div class="value" id="weeklyUsd">$0.00</div><div class="tiny" id="weeklyTok">(0 in / 0 out)</div></div>
    <div class="spacer"></div>
    <div class="tiny" id="path"></div>
  </div>

  <script>
    let sessionStartMs = Date.now();

    function fmtUsd(n) {
      return '$' + (Math.round((n || 0) * 100) / 100).toFixed(2);
    }

    function render() {
      const agg = window.apiUsageTopbar.readAggregate(sessionStartMs);
      document.getElementById('sessionUsd').textContent = fmtUsd(agg.session.costUsd);
      document.getElementById('weeklyUsd').textContent = fmtUsd(agg.weekly.costUsd);
      document.getElementById('sessionTok').textContent = `(${agg.session.inputTokens} in / ${agg.session.outputTokens} out)`;
      document.getElementById('weeklyTok').textContent = `(${agg.weekly.inputTokens} in / ${agg.weekly.outputTokens} out)`;
      document.getElementById('path').textContent = window.apiUsageTopbar.getUsagePath();
    }

    render();
    setInterval(render, 5000);
  </script>
</body>
</html>
